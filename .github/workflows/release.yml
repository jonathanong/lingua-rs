name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-slim
    timeout-minutes: 420
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-release
          cache-bin: "false"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --package lingua-rs

  prepare:
    name: Prepare release
    needs: validate
    runs-on: ubuntu-slim
    timeout-minutes: 420
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Check RELEASE_TOKEN is set
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::RELEASE_TOKEN secret is not set. This workflow requires a PAT that can push release commits and tags to main." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions, commit, and tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          pnpm --prefix package version "${{ inputs.bump }}" --no-git-tag-version
          version="$(node -p "require('./package/package.json').version")"
          node -e "
            const fs = require('node:fs');
            const version = process.argv[1];
            const cargo = fs.readFileSync('package/Cargo.toml', 'utf8')
              .replace(/^version = \".*\"$/m, \`version = \"\${version}\"\`);
            fs.writeFileSync('package/Cargo.toml', cargo);
          " "$version"
          cargo update -w
          node -e "
            const fs = require('node:fs');
            const version = require('./package/package.json').version;
            const p = 'package/index.js';
            const src = fs.readFileSync(p, 'utf8');
            const out = src
              .replace(/bindingPackageVersion !== '\d+\.\d+\.\d+'/g, \`bindingPackageVersion !== '\${version}'\`)
              .replace(/expected \d+\.\d+\.\d+ but got/g, \`expected \${version} but got\`);
            if (out !== src) fs.writeFileSync(p, out);
          "
          git add package/Cargo.toml Cargo.lock package/package.json package/index.js
          git commit -m "chore(release): v$version"
          git tag -a "v$version" -m "v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify versions match
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.bump.outputs.version }}"
          npm_version="$(node -p "require('./package/package.json').version")"
          test "$tag" = "$npm_version" || { echo "npm version $npm_version != tag $tag"; exit 1; }

      - name: Verify index.js binding version matches package.json
        shell: bash
        run: |
          set -euo pipefail
          expected="$(node -p "require('./package/package.json').version")"
          count="$(grep -cE "'[0-9]+\.[0-9]+\.[0-9]+'" package/index.js || true)"
          if [ "$count" -gt 0 ]; then
            mismatches="$(grep -E "'[0-9]+\.[0-9]+\.[0-9]+'" package/index.js | grep -v "'$expected'" || true)"
            if [ -n "$mismatches" ]; then
              echo "::error::index.js has version strings that don't match package.json $expected"
              echo "$mismatches"
              exit 1
            fi
          fi

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Create GitHub release
        run: gh release create "v${{ steps.bump.outputs.version }}" --title "v${{ steps.bump.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-slim
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 420
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: package -> target
          prefix-key: v1-rust-release-${{ matrix.target }}
          cache-bin: "false"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Install dependencies
        working-directory: package
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build native module
        working-directory: package
        shell: bash
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }}

      - name: Generate binary checksum
        working-directory: package
        shell: bash
        run: |
          node -e "
            const crypto = require('node:crypto');
            const fs = require('node:fs');
            const files = fs.readdirSync('.').filter((name) => name.endsWith('.node'));
            if (files.length !== 1) throw new Error('Expected exactly one .node artifact, found ' + files.length);
            const [name] = files;
            const hash = crypto.createHash('sha256');
            fs.createReadStream(name)
              .on('error', (error) => { throw error; })
              .on('data', (chunk) => hash.update(chunk))
              .on('end', () => fs.writeFileSync(name + '.sha256', hash.digest('hex') + '  ' + name + '\n'));
          "

      - name: Upload binary to GitHub release
        working-directory: package
        shell: bash
        run: gh release upload "v${{ needs.prepare.outputs.version }}" ./*.node ./*.node.sha256 --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    name: Publish
    needs:
      - prepare
      - build
    runs-on: ubuntu-slim
    timeout-minutes: 420
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Install dependencies
        working-directory: package
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Publish npm package
        shell: bash
        working-directory: package
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "lingua-rs@$version" version >/dev/null 2>&1; then
            echo "lingua-rs $version is already on npm; skipping"
          else
            npm publish --access public --provenance
          fi
